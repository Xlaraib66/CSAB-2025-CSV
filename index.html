    <div class="csab-status" id="csabStatus">Waiting for CSV data.</div>
    <div class="csab-results" id="csabResults"></div>
  </div>
</div>

<script>
//<![CDATA[
(function () {
  "use strict";

  var CSV_SOURCES = [
    { round: "Round 1", url: "https://cdn.jsdelivr.net/gh/Xlaraib66/CSAB-2025-CSV@main/CSAB-ROUND-1-CLEANED.csv" },
    { round: "Round 2", url: "https://cdn.jsdelivr.net/gh/Xlaraib66/CSAB-2025-CSV@main/CSAB-Round-2-CLEANED.csv" },
    { round: "Round 3", url: "https://cdn.jsdelivr.net/gh/Xlaraib66/CSAB-2025-CSV@main/CSAB-Round-3-CLEANED.csv" }
  ];

  var NEAR_LIMIT = 2000;
  var DISPLAY_LIMIT = 700;
  var rows = [];
  var unknownFilterRows = 0;

  var knownQuotas = [
    "All India",
    "Home State",
    "Other State",
    "DASA-CIWG",
    "DASA-Non CIWG",
    "Goa"
  ];

  var knownCategories = [
    "OPEN",
    "EWS",
    "OBC-NCL",
    "SC",
    "ST",
    "OPEN (PwD)",
    "EWS (PwD)",
    "OBC-NCL (PwD)",
    "SC (PwD)",
    "ST (PwD)"
  ];

  var knownGenders = [
    "Gender-Neutral",
    "Female-only (including Supernumerary)"
  ];

  var el = {
    loader: document.getElementById("csabLoader"),
    loadFiles: document.getElementById("csabLoadFiles"),
    form: document.getElementById("csabForm"),
    rank: document.getElementById("csabRank"),
    quota: document.getElementById("csabQuota"),
    category: document.getElementById("csabCategory"),
    gender: document.getElementById("csabGender"),
    keyword: document.getElementById("csabKeyword"),
    status: document.getElementById("csabStatus"),
    results: document.getElementById("csabResults"),
    note: document.getElementById("csabDataNote")
  };

  function clean(value) {
    return String(value == null ? "" : value)
      .replace(/\uFEFF/g, "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function key(value) {
    return clean(value).toLowerCase();
  }

  function rankNumber(value) {
    var cleaned = String(value == null ? "" : value).replace(/[^\d]/g, "");
    return cleaned ? Number(cleaned) : NaN;
  }

  function parseCSV(text) {
    var out = [];
    var row = [];
    var field = "";
    var quoted = false;

    for (var i = 0; i < text.length; i += 1) {
      var c = text[i];
      var next = text[i + 1];

      if (c === '"') {
        if (quoted && next === '"') {
          field += '"';
          i += 1;
        } else {
          quoted = !quoted;
        }
      } else if (c === "," && !quoted) {
        row.push(field);
        field = "";
      } else if ((c === "\n" || c === "\r") && !quoted) {
        if (c === "\r" && next === "\n") {
          i += 1;
        }
        row.push(field);
        if (row.some(function (cell) { return clean(cell) !== ""; })) {
          out.push(row);
        }
        row = [];
        field = "";
      } else {
        field += c;
      }
    }

    row.push(field);
    if (row.some(function (cell) { return clean(cell) !== ""; })) {
      out.push(row);
    }
    return out;
  }

  function takeEnding(parts, allowed) {
    var lookup = {};
    allowed.forEach(function (item) {
      lookup[key(item)] = item;
    });

    for (var size = Math.min(4, parts.length); size >= 1; size -= 1) {
      var candidate = parts.slice(parts.length - size).join(" ");
      var found = lookup[key(candidate)];
      if (found) {
        parts.splice(parts.length - size, size);
        return found;
      }
    }
    return "";
  }

  function splitProgramDegree(parts) {
    var textParts = parts.map(clean).filter(Boolean);
    if (!textParts.length) {
      return { program: "Unknown program", degree: "" };
    }
    if (textParts.length === 1) {
      return { program: textParts[0], degree: "" };
    }

    var start = -1;
    for (var i = 1; i < textParts.length; i += 1) {
      if (textParts[i].indexOf("(") !== -1) {
        start = i;
        break;
      }
    }

    if (start === -1) {
      return {
        program: textParts[0],
        degree: textParts.slice(1).join(" ")
      };
    }

    var programParts = textParts.slice(0, start);
    var degreeParts = textParts.slice(start);
    var bracketAt = degreeParts[0].indexOf("(");

    if (bracketAt > 0) {
      programParts.push(degreeParts[0].slice(0, bracketAt));
      degreeParts[0] = degreeParts[0].slice(bracketAt);
    }

    return {
      program: clean(programParts.join(" ")),
      degree: clean(degreeParts.join(" "))
    };
  }

  function normalizeRow(fields, round, lineNo) {
    var cells = fields.map(clean);
    if (!cells.length || key(cells[0]) === "institute") {
      return null;
    }

    var closing = rankNumber(cells[cells.length - 1]);
    var opening = rankNumber(cells[cells.length - 2]);
    if (!opening || !closing) {
      return null;
    }

    var left = cells.slice(0, -2).filter(Boolean);
    var institute = left.shift() || "Unknown institute";
    var gender = takeEnding(left, knownGenders) || "Unknown";
    var category = takeEnding(left, knownCategories) || "Unknown";
    var quota = takeEnding(left, knownQuotas) || "Unknown";
    var programDegree = splitProgramDegree(left);

    if (gender === "Unknown" || category === "Unknown") {
      unknownFilterRows += 1;
    }

    return {
      round: round,
      institute: institute,
      program: programDegree.program,
      degree: programDegree.degree,
      quota: quota,
      category: category,
      gender: gender,
      opening: opening,
      closing: closing,
      lineNo: lineNo
    };
  }

  function loadCSVText(round, text) {
    var parsed = parseCSV(text);
    var loaded = [];
    parsed.forEach(function (fields, index) {
      var row = normalizeRow(fields, round, index + 1);
      if (row) {
        loaded.push(row);
      }
    });
    return loaded;
  }

  function setStatus(message) {
    el.status.textContent = message;
  }

  function formatRank(value) {
    return Number(value).toLocaleString("en-IN");
  }

  function quotaMatches(rowQuota, selected) {
    if (selected === "ALL") {
      return true;
    }
    if (selected === "AI_HS") {
      return rowQuota === "All India" || rowQuota === "Home State";
    }
    return rowQuota === selected;
  }

  function categoryMatches(rowCategory, selected) {
    if (selected === "ANY") {
      return true;
    }
    return rowCategory === selected;
  }

  function genderMatches(rowGender, selected) {
    if (selected === "ANY") {
      return true;
    }
    if (selected === "FEMALE") {
      return rowGender === "Gender-Neutral" || rowGender === "Female-only (including Supernumerary)";
    }
    return rowGender === "Gender-Neutral";
  }

  function keywordMatches(row, keyword) {
    if (!keyword) {
      return true;
    }
    var haystack = [
      row.institute,
      row.program,
      row.degree,
      row.quota,
      row.category,
      row.gender,
      row.round
    ].join(" ").toLowerCase();
    return haystack.indexOf(keyword.toLowerCase()) !== -1;
  }

  function nearBand(diff) {
    if (diff <= 1000) {
      return "within 1k";
    }
    if (diff <= 1500) {
      return "within 1.5k";
    }
    return "within 2k";
  }

  function evaluateRow(row, rank) {
    if (rank <= row.closing) {
      return {
        type: "exact",
        label: rank >= row.opening ? "Within range" : "Better than opening",
        diff: row.closing - rank
      };
    }

    var miss = rank - row.closing;
    if (miss > 0 && miss <= NEAR_LIMIT) {
      return {
        type: "near",
        label: "Near miss: " + formatRank(miss) + " rank away, " + nearBand(miss),
        diff: miss
      };
    }

    return null;
  }

  function escapeHTML(value) {
    return String(value == null ? "" : value).replace(/[&<>"']/g, function (char) {
      return {
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char];
    });
  }

  function renderResults(matches, exactCount, nearCount) {
    if (!matches.length) {
      el.results.innerHTML = '<div class="csab-empty">No exact or near cutoff found for this combination. Try All quotas or Any category to inspect broader possibilities.</div>';
      return;
    }

    var visible = matches.slice(0, DISPLAY_LIMIT);
    var rowsHTML = visible.map(function (item) {
      var row = item.row;
      var badgeClass = item.status.type === "exact" ? "csab-badge-ok" : "csab-badge-near";
      return [
        "<tr>",
        "<td><div class=\"csab-main\">" + escapeHTML(row.institute) + "</div><div class=\"csab-sub\">" + escapeHTML(row.round) + "</div></td>",
        "<td><div class=\"csab-main\">" + escapeHTML(row.program) + "</div><div class=\"csab-sub\">" + escapeHTML(row.degree) + "</div></td>",
        "<td>" + escapeHTML(row.quota) + "</td>",
        "<td>" + escapeHTML(row.category) + "</td>",
        "<td>" + escapeHTML(row.gender) + "</td>",
        "<td>" + formatRank(row.opening) + "</td>",
        "<td>" + formatRank(row.closing) + "</td>",
        "<td><span class=\"csab-badge " + badgeClass + "\">" + escapeHTML(item.status.label) + "</span></td>",
        "</tr>"
      ].join("");
    }).join("");

    var hidden = matches.length > DISPLAY_LIMIT
      ? '<span class="csab-pill">Showing first ' + DISPLAY_LIMIT + ' of ' + matches.length + '</span>'
      : "";

    el.results.innerHTML = [
      '<div class="csab-summary">',
      '<span class="csab-pill">' + matches.length + ' total results</span>',
      '<span class="csab-pill">' + exactCount + ' possibilities</span>',
      '<span class="csab-pill">' + nearCount + ' near misses</span>',
      hidden,
      '</div>',
      '<div class="csab-table-wrap">',
      '<table class="csab-table">',
      '<thead><tr>',
      '<th>Institute</th>',
      '<th>Program</th>',
      '<th>Quota</th>',
      '<th>Category</th>',
      '<th>Gender</th>',
      '<th>Opening</th>',
      '<th>Closing</th>',
      '<th>Status</th>',
      '</tr></thead>',
      '<tbody>',
      rowsHTML,
      '</tbody></table></div>'
    ].join("");
  }

  function runSearch(event) {
    if (event) {
      event.preventDefault();
    }

    if (!rows.length) {
      setStatus("Load the CSAB CSV files first.");
      return;
    }

    var rank = rankNumber(el.rank.value);
    if (!rank) {
      setStatus("Enter a valid rank.");
      return;
    }

    var selectedQuota = el.quota.value;
    var selectedCategory = el.category.value;
    var selectedGender = el.gender.value;
    var keyword = clean(el.keyword.value);
    var exactCount = 0;
    var nearCount = 0;

    var matches = rows
      .filter(function (row) {
        return quotaMatches(row.quota, selectedQuota)
          && categoryMatches(row.category, selectedCategory)
          && genderMatches(row.gender, selectedGender)
          && keywordMatches(row, keyword);
      })
      .map(function (row) {
        var status = evaluateRow(row, rank);
        return status ? { row: row, status: status } : null;
      })
      .filter(Boolean);

    matches.forEach(function (item) {
      if (item.status.type === "exact") {
        exactCount += 1;
      } else {
        nearCount += 1;
      }
    });

    matches.sort(function (a, b) {
      if (a.status.type !== b.status.type) {
        return a.status.type === "exact" ? -1 : 1;
      }
      if (a.status.diff !== b.status.diff) {
        return a.status.diff - b.status.diff;
      }
      if (a.row.round !== b.row.round) {
        return a.row.round.localeCompare(b.row.round);
      }
      return a.row.closing - b.row.closing;
    });

    setStatus("Searched " + rows.length + " cutoff rows.");
    renderResults(matches, exactCount, nearCount);
  }

  function finishLoading(nextRows) {
    rows = nextRows;
    var message = "Loaded " + rows.length + " cutoff rows from CSAB 2025 Round 1, Round 2, and Round 3.";
    if (unknownFilterRows) {
      message += " " + unknownFilterRows + " rows have missing category or gender in the CSV and are kept as Unknown.";
    }
    setStatus(message);
  }

  function readFile(file, round) {
    return new Promise(function (resolve, reject) {
      var reader = new FileReader();
      reader.onload = function () {
        resolve(loadCSVText(round, String(reader.result || "")));
      };
      reader.onerror = function () {
        reject(reader.error || new Error("Could not read " + round));
      };
      reader.readAsText(file);
    });
  }

  function loadSelectedFiles() {
    var file1 = document.getElementById("csabFile1").files[0];
    var file2 = document.getElementById("csabFile2").files[0];
    var file3 = document.getElementById("csabFile3").files[0];

    if (!file1 || !file2 || !file3) {
      setStatus("Select all three CSV files first.");
      return;
    }

    unknownFilterRows = 0;
    setStatus("Loading selected CSV files...");
    Promise.all([
      readFile(file1, "Round 1"),
      readFile(file2, "Round 2"),
      readFile(file3, "Round 3")
    ]).then(function (groups) {
      finishLoading([].concat.apply([], groups));
    }).catch(function (error) {
      setStatus("CSV loading failed: " + error.message);
    });
  }

  function loadFromUrls() {
    var ready = CSV_SOURCES.every(function (item) {
      return item.url && item.url.indexOf("PASTE_") === -1;
    });
    if (!ready) {
      setStatus("Waiting for CSV data. Select local CSV files, or add public CSV URLs in the code.");
      return;
    }

    unknownFilterRows = 0;
    setStatus("Loading CSV files from URLs...");
    Promise.all(CSV_SOURCES.map(function (item) {
      return fetch(item.url)
        .then(function (response) {
          if (!response.ok) {
            throw new Error(item.round + " failed with HTTP " + response.status);
          }
          return response.text();
        })
        .then(function (text) {
          return loadCSVText(item.round, text);
        });
    })).then(function (groups) {
      finishLoading([].concat.apply([], groups));
      el.loader.style.display = "none";
    }).catch(function (error) {
